services:
  coordinator:
    build:
      target: production
    environment:
      LOG_LEVEL: INFO
      ENVIRONMENT: production
      COORDINATOR_CONFIG: /app/config.yaml
      DATABASE_PATH: /app/data/coordinator.db
      COORDINATOR_SECRET: ${COORDINATOR_SECRET}
    volumes:
      - ./coordinator/config.yaml:/app/config.yaml:ro
      - coordinator-data:/app/data
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers 4
    restart: unless-stopped

  victoriametrics:
    ports: []
    command:
      - "--storageDataPath=/storage"
      - "--retentionPeriod=1y"
      - "--httpListenAddr=:8428"
      - "--influxSkipSingleField"
    restart: unless-stopped

  grafana:
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: ${GRAFANA_PUBLIC_URL}
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped
    depends_on:
      - coordinator
      - grafana

volumes:
  caddy-data:
  caddy-config:
  coordinator-data:
